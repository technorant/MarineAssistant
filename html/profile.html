<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | BlueEconomy</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            text-align: center;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            background: var(--background-light);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--primary-color);
            border: 4px solid var(--primary-light);
        }
        .profile-info {
            margin-bottom: 30px;
        }
        .profile-info h2 {
            margin-bottom: 10px;
            color: var(--primary-dark);
        }
        .profile-info p {
            color: #666;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">🌊 BlueEconomy</div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">Dashboard</a>
                <a href="chat.html" class="nav-item">Chat Assistant</a>
                <a href="safety.html" class="nav-item">Safety Status</a>
                <a href="knowledge.html" class="nav-item">Knowledge Base</a>
                <a href="profile.html" class="nav-item active">Profile</a>
            </nav>
            <a href="#" onclick="logout()" class="nav-item logout-btn">Logout</a>
        </aside>

        <main class="main-content">
            <header class="welcome-header">
                <h1>My Profile</h1>
            </header>

            <div class="profile-container fade-in">
                <div class="profile-avatar">👤</div>
                <div class="profile-info">
                    <h2 id="display-name">Marine Member</h2>
                    <p id="user-email">email@example.com</p>
                </div>
                <button class="btn btn-primary logout-btn">Logout</button>
            </div>
        </main>
    </div>

    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/dashboard.js"></script>
</body>
</html>
